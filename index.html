<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBA Top 30 — Лучшие игры Game Boy Advance</title>
  <meta name="description" content="Интерактивный каталог 30 лучших игр для Game Boy Advance с фильтрами по жанрам и рейтингам">
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./base.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- Header -->
  <header class="header" id="header">
    <div class="header-inner">
      <div class="logo">
        <svg width="36" height="24" viewBox="0 0 36 24" fill="none" aria-label="GBA Top 30 Logo">
          <rect x="0" y="2" width="36" height="20" rx="4" fill="currentColor" opacity="0.15"/>
          <rect x="2" y="4" width="20" height="14" rx="2" fill="currentColor" opacity="0.3"/>
          <circle cx="28" cy="9" r="2.5" fill="currentColor" opacity="0.5"/>
          <circle cx="32" cy="13" r="1.5" fill="currentColor" opacity="0.4"/>
          <circle cx="26" cy="13" r="1.5" fill="currentColor" opacity="0.4"/>
        </svg>
        <span class="logo-text">GBA<span class="logo-accent">Top30</span></span>
      </div>
      <div class="header-actions">
        <div class="game-count" id="gameCount">30 игр</div>
        <button data-theme-toggle aria-label="Переключить тему">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <!-- Hero -->
    <section class="hero">
      <div class="hero-inner">
        <div class="hero-badge">Каталог классики</div>
        <h1 class="hero-title">Лучшие игры<br><span class="hero-accent">Game Boy Advance</span></h1>
        <p class="hero-desc">30 культовых тайтлов, определивших золотую эру портативного гейминга. Фильтруй по жанрам и рейтингам.</p>
      </div>
      <div class="hero-gba">
        <svg viewBox="0 0 280 180" fill="none" class="hero-gba-svg" aria-hidden="true">
          <rect x="10" y="10" width="260" height="160" rx="16" fill="var(--color-surface)" stroke="var(--gba-accent)" stroke-width="1.5"/>
          <rect x="60" y="25" width="160" height="100" rx="4" fill="var(--gba-screen)"/>
          <rect x="64" y="29" width="152" height="92" rx="2" fill="var(--gba-screen-inner)"/>
          <!-- D-pad -->
          <rect x="30" y="125" width="10" height="30" rx="2" fill="var(--gba-btn)"/>
          <rect x="20" y="135" width="30" height="10" rx="2" fill="var(--gba-btn)"/>
          <!-- Buttons -->
          <circle cx="230" cy="135" r="8" fill="var(--gba-btn-ab)"/>
          <circle cx="250" cy="125" r="8" fill="var(--gba-btn-ab)"/>
          <!-- Start/Select -->
          <rect x="110" y="140" width="20" height="6" rx="3" fill="var(--gba-btn)" opacity="0.5"/>
          <rect x="148" y="140" width="20" height="6" rx="3" fill="var(--gba-btn)" opacity="0.5"/>
          <!-- Screen pixel text -->
          <text x="140" y="78" text-anchor="middle" font-size="11" fill="var(--gba-pixel-text)" font-family="monospace" opacity="0.7">TOP 30 GAMES</text>
        </svg>
      </div>
    </section>

    <!-- Filters -->
    <section class="filters-section" id="filters">
      <div class="filters-inner">
        <div class="filter-group">
          <label class="filter-label">Жанр</label>
          <div class="filter-chips" id="genreFilters">
            <button class="chip active" data-genre="all">Все</button>
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">Рейтинг</label>
          <div class="filter-chips" id="ratingFilters">
            <button class="chip active" data-rating="all">Все</button>
            <button class="chip" data-rating="95">95+</button>
            <button class="chip" data-rating="92">92+</button>
            <button class="chip" data-rating="90">90+</button>
            <button class="chip" data-rating="85">85+</button>
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">Сортировка</label>
          <div class="filter-chips" id="sortFilters">
            <button class="chip active" data-sort="rank">По рангу</button>
            <button class="chip" data-sort="rating">По рейтингу</button>
            <button class="chip" data-sort="year">По году</button>
            <button class="chip" data-sort="name">По имени</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Games grid -->
    <section class="games-section">
      <div class="games-grid" id="gamesGrid">
        <!-- Cards generated by JS -->
      </div>
      <div class="no-results" id="noResults" style="display:none;">
        <div class="no-results-icon">🎮</div>
        <p>Нет игр, подходящих под выбранные фильтры</p>
        <button class="reset-btn" id="resetFilters">Сбросить фильтры</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-text">GBA Top 30 — рейтинги на основе Metacritic. Game Boy Advance (2001–2008).</p>
    </div>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
